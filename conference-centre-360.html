<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conference Centre — 360° View</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #3F3F3F; }
    #viewer { width: 100%; height: 100%; }

    #branding {
      position: fixed;
      bottom: 15px;
      left: 15px;
      z-index: 100;
      background: #3F3F3F;
      padding: 12px 16px;
      color: #FFFFFF;
      font-family: "Roboto Bold", Arial, sans-serif;
      font-weight: 400;
      pointer-events: none;
      border-radius: 0;
    }
    #branding strong {
      display: block;
      font-size: 16px;
      font-weight: 400;
      margin-bottom: 2px;
    }
    #branding span {
      font-size: 13px;
      opacity: 0.65;
      font-family: "Roboto Regular", Arial, sans-serif;
    }

    #hint {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: #3F3F3F;
      color: #FFFFFF;
      font-size: 13px;
      padding: 12px 16px;
      pointer-events: none;
      z-index: 100;
      transition: opacity 1s;
      font-family: "Roboto Regular", Arial, sans-serif;
      white-space: nowrap;
      border-radius: 0;
      opacity: 0.85;
    }

    .pnlm-zoom-in,
    .pnlm-zoom-out,
    .pnlm-fullscreen-toggle-button {
      background-color: #00B6EA !important;
      border-radius: 0 !important;
      color: #FFFFFF !important;
    }
    .pnlm-zoom-in::before,
    .pnlm-zoom-out::before,
    .pnlm-fullscreen-toggle-button::before {
      color: #FFFFFF !important;
    }
    .pnlm-zoom-in:hover,
    .pnlm-zoom-out:hover,
    .pnlm-fullscreen-toggle-button:hover {
      background-color: #DE3D95 !important;
    }
    .pnlm-load-button {
      background-color: #3F3F3F !important;
      border-radius: 0 !important;
    }
    .pnlm-load-button p {
      background-color: #00B6EA !important;
      border-radius: 0 !important;
    }
    .pnlm-load-button:hover p {
      background-color: #DE3D95 !important;
    }

    /* Hotspot styling */
    .pnlm-hotspot.pnlm-scene {
      background: #00B6EA;
      border-radius: 0;
      width: 44px;
      height: 44px;
      margin-left: -22px;
      margin-top: -22px;
      border: 2px solid #FFFFFF;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .pnlm-hotspot.pnlm-scene:hover {
      background: #DE3D95;
    }
    .pnlm-hotspot-base.pnlm-scene span {
      display: none;
    }
    .pnlm-tooltip span {
      background: #3F3F3F;
      color: #FFFFFF;
      font-family: "Roboto Regular", Arial, sans-serif;
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 0;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="branding">
    <strong>Conference Centre</strong>
    <span>SilverStar Mountain Resort · 360° View</span>
  </div>

  <div id="hint">Click the arrows to move through the space</div>

  <div id="viewer"></div>

  <script>
    var isMobile = window.innerWidth < 768;

    pannellum.viewer('viewer', {
      default: {
        firstScene: 'scene6',
        sceneFadeDuration: 1000,
        autoLoad: true,
        showZoomCtrl: true,
        showFullscreenCtrl: true,
        mouseZoom: true,
        minHfov: 50,
        maxHfov: 120,
        hfov: isMobile ? 100 : 120,
        compass: false,
      },
      scenes: {

        // Scene 1 — Top of stairs (bottom left, foyer level)
        scene1: {
          panorama: 'Conference Centre-1.jpg',
          pitch: 0,
          yaw: 0,
          hotSpots: [
            {
              pitch: 0,
              yaw: 0,       // placeholder — faces into foyer toward scene 2
              type: 'scene',
              sceneId: 'scene2',
              text: 'Enter foyer',
            }
          ]
        },

        // Scene 2 — Outside ballroom / foyer
        scene2: {
          panorama: 'Conference Centre-2.jpg',
          pitch: 0,
          yaw: 0,
          hotSpots: [
            {
              pitch: 0,
              yaw: 180,     // placeholder — back toward stairs
              type: 'scene',
              sceneId: 'scene1',
              text: 'Stairs',
            },
            {
              pitch: 0,
              yaw: 0,       // placeholder — through door 1 toward stage/scene 3
              type: 'scene',
              sceneId: 'scene3',
              text: 'Enter ballroom',
            },
            {
              pitch: 0,
              yaw: 90,      // placeholder — through door 4 toward scene 4
              type: 'scene',
              sceneId: 'scene4',
              text: 'Enter ballroom',
            }
          ]
        },

        // Scene 3 — Stage / dancefloor (bottom left of ballroom)
        scene3: {
          panorama: 'Conference Centre-3.jpg',
          pitch: 0,
          yaw: 0,
          hotSpots: [
            {
              pitch: 0,
              yaw: 180,     // placeholder — back out to foyer
              type: 'scene',
              sceneId: 'scene2',
              text: 'Foyer',
            },
            {
              pitch: 0,
              yaw: 90,      // placeholder — into mid ballroom
              type: 'scene',
              sceneId: 'scene6',
              text: 'Mid ballroom',
            }
          ]
        },

        // Scene 4 — Bottom right of ballroom
        scene4: {
          panorama: 'Conference Centre-4.jpg',
          pitch: 0,
          yaw: 0,
          hotSpots: [
            {
              pitch: 0,
              yaw: 180,     // placeholder — back to foyer
              type: 'scene',
              sceneId: 'scene2',
              text: 'Foyer',
            },
            {
              pitch: 0,
              yaw: 90,      // placeholder — toward mid ballroom
              type: 'scene',
              sceneId: 'scene6',
              text: 'Mid ballroom',
            },
            {
              pitch: 0,
              yaw: 0,       // placeholder — toward back corner
              type: 'scene',
              sceneId: 'scene5',
              text: 'Back of ballroom',
            }
          ]
        },

        // Scene 5 — Back right corner of ballroom
        scene5: {
          panorama: 'Conference Centre-5.jpg',
          pitch: 0,
          yaw: 0,
          hotSpots: [
            {
              pitch: 0,
              yaw: 180,     // placeholder — back to mid ballroom
              type: 'scene',
              sceneId: 'scene6',
              text: 'Mid ballroom',
            },
            {
              pitch: 0,
              yaw: 90,      // placeholder — toward scene 4
              type: 'scene',
              sceneId: 'scene4',
              text: 'Ballroom entrance side',
            }
          ]
        },

        // Scene 6 — Mid ballroom (primary / default scene)
        scene6: {
          panorama: 'Conference Centre-6.jpg',
          pitch: 0,
          yaw: 0,
          hotSpots: [
            {
              pitch: 0,
              yaw: 180,     // placeholder — toward stage/dancefloor
              type: 'scene',
              sceneId: 'scene3',
              text: 'Stage & dancefloor',
            },
            {
              pitch: 0,
              yaw: 90,      // placeholder — toward back right
              type: 'scene',
              sceneId: 'scene4',
              text: 'Ballroom entrance side',
            },
            {
              pitch: 0,
              yaw: 0,       // placeholder — toward back corner
              type: 'scene',
              sceneId: 'scene5',
              text: 'Back of ballroom',
            }
          ]
        }

      }
    });

    setTimeout(function() {
      var hint = document.getElementById('hint');
      if (hint) {
        hint.style.opacity = '0';
        setTimeout(function() { if (hint.parentNode) hint.parentNode.removeChild(hint); }, 1000);
      }
    }, 5000);
  </script>

</body>
</html>
