<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conference Centre — 360° View</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #3F3F3F; }
    #viewer { width: 100%; height: 100%; }
    #branding {
      position: fixed;
      bottom: 15px;
      left: 15px;
      z-index: 100;
      background: #3F3F3F;
      padding: 12px 16px;
      color: #FFFFFF;
      font-family: "Roboto Bold", Arial, sans-serif;
      font-weight: 400;
      pointer-events: none;
    }
    #branding strong { display: block; font-size: 16px; font-weight: 400; margin-bottom: 2px; }
    #branding span { font-size: 13px; opacity: 0.65; font-family: "Roboto Regular", Arial, sans-serif; }
    #hint {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: #3F3F3F;
      color: #FFFFFF;
      font-size: 13px;
      padding: 12px 16px;
      pointer-events: none;
      z-index: 100;
      transition: opacity 1s;
      font-family: "Roboto Regular", Arial, sans-serif;
      white-space: nowrap;
      opacity: 0.85;
    }
    .pnlm-zoom-in, .pnlm-zoom-out, .pnlm-fullscreen-toggle-button {
      background-color: #00B6EA !important;
      border-radius: 0 !important;
      color: #FFFFFF !important;
    }
    .pnlm-zoom-in::before, .pnlm-zoom-out::before, .pnlm-fullscreen-toggle-button::before { color: #FFFFFF !important; }
    .pnlm-zoom-in:hover, .pnlm-zoom-out:hover, .pnlm-fullscreen-toggle-button:hover { background-color: #DE3D95 !important; }
    .pnlm-load-button { background-color: #3F3F3F !important; border-radius: 0 !important; }
    .pnlm-load-button p { background-color: #00B6EA !important; border-radius: 0 !important; }
    .pnlm-load-button:hover p { background-color: #DE3D95 !important; }
    .pnlm-hotspot.pnlm-scene {
      background: #00B6EA;
      border-radius: 0;
      width: 44px;
      height: 44px;
      margin-left: -22px;
      margin-top: -22px;
      border: 2px solid #FFFFFF;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .pnlm-hotspot.pnlm-scene:hover { background: #DE3D95; }
    .pnlm-tooltip span {
      background: #3F3F3F;
      color: #FFFFFF;
      font-family: "Roboto Regular", Arial, sans-serif;
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 0;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="branding">
    <strong>Conference Centre</strong>
    <span>SilverStar Mountain Resort · 360° View</span>
  </div>
  <div id="hint">Click the blue markers to move through the space</div>
  <div id="viewer"></div>
  <script>
    var isMobile = window.innerWidth < 768;
    pannellum.viewer('viewer', {
      default: {
        firstScene: 'scene6',
        sceneFadeDuration: 1000,
        autoLoad: true,
        showZoomCtrl: true,
        showFullscreenCtrl: true,
        mouseZoom: true,
        minHfov: 50,
        maxHfov: 120,
        hfov: isMobile ? 100 : 120,
        compass: false,
      },
      scenes: {

        scene1: {
          panorama: 'Conference Centre-1.jpg',
          pitch: -24, yaw: -73,
          hotSpots: [
            { pitch: -21, yaw: -67,  type: 'scene', sceneId: 'scene2', text: 'Outside ballroom' },
            { pitch: -32, yaw: -139, type: 'scene', sceneId: 'scene3', text: 'Stage & dancefloor' },
            { pitch: -11, yaw: -97,  type: 'scene', sceneId: 'scene6', text: 'Mid ballroom' },
            { pitch: -9,  yaw: -80,  type: 'scene', sceneId: 'scene4', text: 'Ballroom entrance side' },
          ]
        },

        scene2: {
          panorama: 'Conference Centre-2.jpg',
          pitch: -16, yaw: 162,
          hotSpots: [
            { pitch: -3,  yaw: 160,  type: 'scene', sceneId: 'scene1', text: 'Top of stairs' },
            { pitch: -3,  yaw: -70,  type: 'scene', sceneId: 'scene5', text: 'Back of ballroom' },
            { pitch: -12, yaw: -165, type: 'scene', sceneId: 'scene3', text: 'Stage & dancefloor' },
          ]
        },

        scene3: {
          panorama: 'Conference Centre-3.jpg',
          pitch: -17, yaw: 118,
          hotSpots: [
            { pitch: -13, yaw: -169, type: 'scene', sceneId: 'scene2', text: 'Outside ballroom' },
            { pitch: -7,  yaw: 146,  type: 'scene', sceneId: 'scene6', text: 'Mid ballroom' },
            { pitch: -7,  yaw: 173,  type: 'scene', sceneId: 'scene4', text: 'Ballroom entrance side' },
            { pitch: -2,  yaw: -93,  type: 'scene', sceneId: 'scene1', text: 'Top of stairs' },
          ]
        },

        scene4: {
          panorama: 'Conference Centre-4.jpg',
          pitch: -10, yaw: -71,
          hotSpots: [
            { pitch: -4,  yaw: -11,  type: 'scene', sceneId: 'scene5', text: 'Back of ballroom' },
            { pitch: -5,  yaw: -69,  type: 'scene', sceneId: 'scene6', text: 'Mid ballroom' },
            { pitch: -6,  yaw: -97,  type: 'scene', sceneId: 'scene3', text: 'Stage & dancefloor' },
            { pitch: -11, yaw: -116, type: 'scene', sceneId: 'scene2', text: 'Outside ballroom' },
            { pitch: -1,  yaw: -117, type: 'scene', sceneId: 'scene1', text: 'Top of stairs' },
          ]
        },

        scene5: {
          panorama: 'Conference Centre-5.jpg',
          pitch: -12, yaw: 131,
          hotSpots: [
            { pitch: -11, yaw: 83,   type: 'scene', sceneId: 'scene4', text: 'Ballroom entrance side' },
            { pitch: -7,  yaw: 145,  type: 'scene', sceneId: 'scene6', text: 'Mid ballroom' },
            { pitch: -3,  yaw: 124,  type: 'scene', sceneId: 'scene2', text: 'Outside ballroom' },
          ]
        },

        scene6: {
          panorama: 'Conference Centre-6.jpg',
          pitch: -19, yaw: 175,
          hotSpots: [
            { pitch: -6,  yaw: -31,  type: 'scene', sceneId: 'scene5', text: 'Back of ballroom' },
            { pitch: -3,  yaw: 20,   type: 'scene', sceneId: 'scene4', text: 'Ballroom entrance side' },
            { pitch: -12, yaw: 152,  type: 'scene', sceneId: 'scene3', text: 'Stage & dancefloor' },
            { pitch: -5,  yaw: 97,   type: 'scene', sceneId: 'scene2', text: 'Outside ballroom' },
          ]
        },

      }
    });

    setTimeout(function() {
      var hint = document.getElementById('hint');
      if (hint) {
        hint.style.opacity = '0';
        setTimeout(function() { if (hint.parentNode) hint.parentNode.removeChild(hint); }, 1000);
      }
    }, 5000);
  </script>
</body>
</html>
