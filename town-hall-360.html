<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Town Hall — 360° View</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    #viewer { width: 100%; height: 100%; }
    #branding {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 100;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 8px 14px;
      color: #fff;
      font-family: Roboto, sans-serif;
      pointer-events: none;
    }
    #branding strong { display: block; font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    #branding span { font-size: 12px; opacity: 0.65; }
    #hint {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
      pointer-events: none;
      z-index: 100;
      transition: opacity 1s;
      font-family: Roboto, sans-serif;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="branding">
    <strong>Town Hall</strong>
    <span>SilverStar Mountain Resort · 360° View</span>
  </div>

  <div id="hint">Click &amp; drag to look around &nbsp;·&nbsp; Scroll to zoom</div>

  <div id="viewer"></div>

  <script>
    pannellum.viewer('viewer', {
      type: 'equirectangular',
      panorama: 'den-360.jpg',
      autoLoad: true,
      autoRotate: -1.5,
      autoRotateInactivityDelay: 4000,
      compass: false,
      showFullscreenCtrl: true,
      showZoomCtrl: true,
      mouseZoom: true,
      hfov: 100,
      minHfov: 50,
      maxHfov: 120,
      pitch: 0,
      yaw: 180,
    });

    setTimeout(function() {
      var hint = document.getElementById('hint');
      if (hint) {
        hint.style.opacity = '0';
        setTimeout(function() { if (hint.parentNode) hint.parentNode.removeChild(hint); }, 1000);
      }
    }, 5000);
  </script>

</body>
</html>
