<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Town Hall — 360° View</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #3F3F3F; }
    #viewer { width: 100%; height: 100%; }

    #branding {
      position: fixed;
      bottom: 15px;
      left: 15px;
      z-index: 100;
      background: #3F3F3F;
      padding: 12px 16px;
      color: #FFFFFF;
      font-family: "Roboto Bold", Arial, sans-serif;
      font-weight: 400;
      pointer-events: none;
      border-radius: 0;
    }
    #branding strong {
      display: block;
      font-size: 16px;
      font-weight: 400;
      margin-bottom: 2px;
    }
    #branding span {
      font-size: 13px;
      opacity: 0.65;
      font-family: "Roboto Regular", Arial, sans-serif;
    }

    #hint {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: #3F3F3F;
      color: #FFFFFF;
      font-size: 13px;
      padding: 12px 16px;
      pointer-events: none;
      z-index: 100;
      transition: opacity 1s;
      font-family: "Roboto Regular", Arial, sans-serif;
      white-space: nowrap;
      border-radius: 0;
      opacity: 0.85;
    }

    /* Colour and shape only — don't touch Pannellum's icon/layout styles */
    .pnlm-zoom-in,
    .pnlm-zoom-out,
    .pnlm-fullscreen-toggle-button {
      background-color: #FFFFFF !important;
      border-radius: 0 !important;
    }
    .pnlm-zoom-in::before,
    .pnlm-zoom-out::before,
    .pnlm-fullscreen-toggle-button::before {
      color: #FFFFFF !important;
    }
    .pnlm-zoom-in:hover,
    .pnlm-zoom-out:hover,
    .pnlm-fullscreen-toggle-button:hover {
      background-color: #00B6EA !important;
      color: #FFFFFF !important;
    }
    .pnlm-load-button {
      background-color: #3F3F3F !important;
      border-radius: 0 !important;
    }
    .pnlm-load-button p {
      background-color: #00B6EA !important;
      color: #FFFFFF !important;
      border-radius: 0 !important;
    }
    .pnlm-load-button:hover p {
      background-color: #DE3D95 !important;
    }
  </style>
</head>
<body>

  <div id="branding">
    <strong>Town Hall</strong>
    <span>SilverStar Mountain Resort · 360° View</span>
  </div>

  <div id="hint">Click &amp; drag to look around &nbsp;·&nbsp; Scroll to zoom</div>

  <div id="viewer"></div>

  <script>
    pannellum.viewer('viewer', {
      type: 'equirectangular',
      panorama: 'den-360.jpg',
      autoLoad: true,
      autoRotate: -1.5,
      autoRotateInactivityDelay: 4000,
      compass: false,
      showFullscreenCtrl: true,
      showZoomCtrl: true,
      mouseZoom: true,
      hfov: window.innerWidth < 768 ? 100 : 120,
      minHfov: 50,
      maxHfov: 120,
      pitch: 0,
      yaw: 180,
    });

    setTimeout(function() {
      var hint = document.getElementById('hint');
      if (hint) {
        hint.style.opacity = '0';
        setTimeout(function() { if (hint.parentNode) hint.parentNode.removeChild(hint); }, 1000);
      }
    }, 5000);
  </script>

</body>
</html>
