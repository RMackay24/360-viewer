<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Town Hall — 360° View</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #3F3F3F; }
    #viewer { width: 100%; height: 100%; }
    #branding {
      position: fixed; bottom: 15px; right: 15px; z-index: 100;
      background: #3F3F3F; padding: 12px 16px; color: #FFFFFF;
      font-family: "Roboto Bold", Arial, sans-serif; font-weight: 400;
      pointer-events: none; border-radius: 0;
    }
    #branding strong { display: block; font-size: 16px; font-weight: 400; margin-bottom: 2px; }
    #branding span { font-size: 13px; opacity: 0.65; font-family: "Roboto Regular", Arial, sans-serif; }
    #hint {
      position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
      background: #3F3F3F; color: #FFFFFF; font-size: 13px; padding: 12px 16px;
      pointer-events: none; z-index: 100; transition: opacity 1s;
      font-family: "Roboto Regular", Arial, sans-serif; white-space: nowrap;
      border-radius: 0; opacity: 0.85;
    }
    .pnlm-zoom-in, .pnlm-zoom-out, .pnlm-fullscreen-toggle-button {
      background-color: #FFFFFF !important; border-radius: 0 !important;
    }
    .pnlm-zoom-in::before, .pnlm-zoom-out::before, .pnlm-fullscreen-toggle-button::before { color: #FFFFFF !important; }
    .pnlm-zoom-in:hover, .pnlm-zoom-out:hover, .pnlm-fullscreen-toggle-button:hover {
      background-color: #00B6EA !important; color: #FFFFFF !important;
    }
    .pnlm-load-button { background-color: #3F3F3F !important; border-radius: 0 !important; }
    .pnlm-load-button p { background-color: #00B6EA !important; color: #FFFFFF !important; border-radius: 0 !important; }
    .pnlm-load-button:hover p { background-color: #DE3D95 !important; }
    .pnlm-hotspot.pnlm-scene {
      background: transparent !important; border: none !important;
      border-radius: 50% !important; width: 26px !important; height: 26px !important;
      margin-left: -13px !important; margin-top: -13px !important; cursor: pointer !important;
    }
    .pnlm-hotspot.pnlm-scene::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); width: 14px; height: 14px;
      background: #00B6EA; border-radius: 50%; border: 2px solid #FFFFFF;
      z-index: 2; transition: background 0.15s ease;
    }
    .pnlm-hotspot.pnlm-scene::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1); width: 26px; height: 26px;
      background: rgba(0, 182, 234, 0.4); border-radius: 50%;
      animation: pulse 2s ease-out infinite; z-index: 1;
    }
    .pnlm-hotspot.pnlm-scene:hover::before { background: #DE3D95 !important; }
    .pnlm-hotspot.pnlm-scene:hover::after { background: rgba(222, 61, 149, 0.4); }
    @keyframes pulse {
      0%   { transform: translate(-50%, -50%) scale(1);   opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(2.8); opacity: 0; }
    }
    .pnlm-tooltip span {
      background: #3F3F3F; color: #FFFFFF;
      font-family: "Roboto Regular", Arial, sans-serif;
      font-size: 13px; padding: 6px 12px; border-radius: 0; white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="branding">
    <strong>Town Hall</strong>
    <span>SilverStar Mountain Resort · 360° View</span>
  </div>
  <div id="hint">Click the markers to move through the space</div>
  <div id="viewer"></div>
  <script>
    var isMobile = window.innerWidth < 768;
    pannellum.viewer('viewer', {
      default: {
        firstScene: 'scene3',
        sceneFadeDuration: 1000,
        autoLoad: true,
        showZoomCtrl: true,
        showFullscreenCtrl: true,
        mouseZoom: true,
        minHfov: 50,
        maxHfov: 120,
        hfov: isMobile ? 100 : 120,
        compass: false,
      },
      scenes: {
        scene1: {
          panorama: 'Town-Hall-Wedding-1.jpg',
          pitch: -6, yaw: 152,
          hotSpots: [
            { pitch: -5, yaw: -149, type: 'scene', sceneId: 'scene3', text: 'View 3' },
            { pitch: -5, yaw: -170, type: 'scene', sceneId: 'scene2', text: 'View 2' },
          ]
        },
        scene2: {
          panorama: 'Town-Hall-Wedding-2.jpg',
          pitch: -11, yaw: 173,
          hotSpots: [
            { pitch: -5, yaw: -19,  type: 'scene', sceneId: 'scene4', text: 'View 4' },
            { pitch: -5, yaw: 34,   type: 'scene', sceneId: 'scene3', text: 'View 3' },
            { pitch: -5, yaw: 172,  type: 'scene', sceneId: 'scene1', text: 'View 1' },
          ]
        },
        scene3: {
          panorama: 'Town-Hall-Wedding-3.jpg',
          pitch: -15, yaw: -145,
          hotSpots: [
            { pitch: -5, yaw: -61,  type: 'scene', sceneId: 'scene4', text: 'View 4' },
            { pitch: -5, yaw: -145, type: 'scene', sceneId: 'scene2', text: 'View 2' },
            { pitch: -5, yaw: -169, type: 'scene', sceneId: 'scene1', text: 'View 1' },
          ]
        },
        scene4: {
          panorama: 'Town-Hall-Wedding-4.jpg',
          pitch: -23, yaw: 160,
          hotSpots: [
            { pitch: -5, yaw: 131,  type: 'scene', sceneId: 'scene3', text: 'View 3' },
            { pitch: -8, yaw: 172,  type: 'scene', sceneId: 'scene2', text: 'View 2' },
          ]
        },
      }
    });
    setTimeout(function() {
      var hint = document.getElementById('hint');
      if (hint) {
        hint.style.opacity = '0';
        setTimeout(function() { if (hint.parentNode) hint.parentNode.removeChild(hint); }, 1000);
      }
    }, 5000);
  </script>
</body>
</html>
